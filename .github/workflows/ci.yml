name: CI - Extensión Sentinel

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🧹 Lint
        run: npm run lint || echo "No lint script defined, skipping"

      - name: 🔨 Compilar TypeScript
        run: npm run build

      - name: 🧪 Tests (si existen)
        run: npm test || echo "No tests defined, skipping"

      - name: 📦 Empaquetar extensión (zip)
        run: |
          cd apps/extension
          zip -r ../../sentinel-extension.zip . -x "node_modules/*" ".git/*"

      - name: 📤 Subir artefacto (zip)
        uses: actions/upload-artifact@v7
        with:
          name: sentinel-extension
          path: sentinel-extension.zip
