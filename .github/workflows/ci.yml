name: CI - Extensión Sentinel

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v4

      - name: 🧰 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 📦 Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: 🧹 Lint
        run: pnpm run lint || echo "No lint script defined, skipping"

      - name: 🔨 Compilar TypeScript
        run: pnpm run build || echo "No build script in root, maybe try per package"

      - name: 🧪 Tests (si existen)
        run: pnpm test || echo "No tests defined, skipping"

      - name: 📦 Empaquetar extensión (zip)
        run: |
          cd apps/extension
          zip -r ../../sentinel-extension.zip . -x "node_modules/*" ".git/*"

      - name: 📤 Subir artefacto (zip)
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-extension
          path: sentinel-extension.zip
